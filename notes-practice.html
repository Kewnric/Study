<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudySession Pro — Notebook MCQ Practice Session.">
  <title>Notebook Session — StudySession Pro</title>

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tutorial.css">

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    @keyframes screenHurt {
      0% { box-shadow: inset 0 0 100px 50px rgba(255, 0, 0, 0.7); }
      100% { box-shadow: inset 0 0 0px 0px rgba(255, 0, 0, 0); }
    }
    .hurt-active {
      animation: screenHurt 1s ease-out forwards;
    }
    
    button.review-correct {
      background-color: var(--color-success) !important;
      color: white !important;
      border-color: var(--color-success) !important;
    }
    button.review-wrong {
      background-color: var(--color-danger) !important;
      color: white !important;
      border-color: var(--color-danger) !important;
    }
  </style>
</head>

<body>
  <div id="hurt-overlay" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 9999;"></div>

  <!-- ===== Full-width Dark Practice Layout ===== -->
  <div class="practice-layout" style="height: 100vh; border-radius: 0; border: none;">

    <!-- Top Bar (Practice Mode) -->
    <div class="practice-topbar" id="np-topbar-practice">
      <div class="practice-topbar-left">
        <button onclick="window.location.href='study.html'" class="btn-back-dark" id="np-back-btn">
          <i data-lucide="chevron-left" style="width:18px;height:18px;"></i> Back
        </button>
        <span id="np-notebook-title" class="practice-title-badge">Loading Notebook...</span>
      </div>

      <div class="practice-topbar-right" style="display:flex; align-items:center; gap: 1rem;">
        <button class="tutorial-trigger-btn" onclick="GuidedTutorial.start()" title="Show Page Tour">
          <i data-lucide="graduation-cap"></i>
        </button>
        <select id="theme-selector" class="form-select" onchange="changeTheme(this.value)" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; width: auto;">
          <option value="dark">Night</option>
          <option value="light">Day</option>
          <option value="purple">Purple</option>
          <option value="green">Green</option>
        </select>
        <div id="np-timer-container" class="timer-display">
          <i data-lucide="clock"></i>
          <span id="np-timer-display">--:--</span>
        </div>
        <button onclick="npSubmitAttempt()" class="btn-submit" id="np-submit-btn">
          <i data-lucide="check" style="width:16px;height:16px;"></i> Submit
        </button>
      </div>
    </div>

    <!-- Top Bar (Review Mode — hidden initially) -->
    <div class="practice-topbar np-review-topbar hidden" id="np-topbar-review">
      <div class="practice-topbar-left">
        <button onclick="exitReview()" class="btn-back-dark">
          <i data-lucide="arrow-left" style="width:18px;height:18px;"></i> Back to Notes Library
        </button>
        <span class="practice-title-badge" style="background:rgba(16,185,129,0.15); color:#10b981; border-color:rgba(16,185,129,0.3);">
          <i data-lucide="check-circle-2" style="width:14px;height:14px;"></i> Review Mode
        </span>
      </div>
      <div class="practice-topbar-right">
        <div id="np-review-score" style="display:flex; align-items:center; gap:0.75rem; font-weight:700; font-size:1rem;">
          <!-- Score badge injected by JS -->
        </div>
      </div>
    </div>

    <!-- Practice Body -->
    <div class="practice-body">

      <!-- Left Sidebar: Sections & Grid -->
      <div class="practice-sidebar" style="width: 320px; min-width: 320px;">
        <div style="margin-bottom: 1rem;">
          <h2 style="display: flex; align-items: center; gap: 0.5rem;">
            <i data-lucide="layers" style="width:18px;height:18px;color:var(--color-primary);"></i> Sections
          </h2>
        </div>

        <div id="np-sections-tabs" style="display: flex; flex-direction: column; gap: 0.375rem; margin-bottom: 1.5rem;">
        </div>

        <div style="border-top: 1px solid #21262d; padding-top: 1rem; margin-bottom: 1rem;">
          <h3 style="font-size: 0.8125rem; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem;" id="np-current-section-title">Section</h3>
          <div id="np-question-grid" class="np-grid">
          </div>
        </div>

        <div class="practice-footer" id="np-footer-text">
          <p>Select your answers by clicking the bubbles. Navigate with Previous/Next or click the grid.</p>
        </div>
      </div>

      <!-- Right Pane: Question + Answer Bubbles -->
      <div class="np-question-pane" style="flex: 1; display: flex; align-items: center; justify-content: center; background: #0d1117; position: relative;">
        <div style="width: 100%; max-width: 900px; padding: 2.5rem 2rem;">

          <!-- Question Header -->
          <div style="text-align: center; margin-bottom: 2.5rem; position: relative;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
              <button id="np-hint-btn" onclick="showHintModal()" class="btn btn-ghost hidden" style="color:var(--color-warning); padding:0.25rem; font-size: 0.75rem; font-weight: 600;" title="Show Hint">
                <i data-lucide="eye" style="width:16px;height:16px;margin-right:0.25rem;"></i> Show hint
              </button>
              <div style="font-size: 0.6875rem; color: var(--text-tertiary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;" id="np-q-label">Question 1</div>
              <div style="width: 80px;"></div> <!-- Spacer for balance -->
            </div>
            
            <h2 style="display:none; color: var(--text-primary);" id="np-q-heading">Select your answer</h2>
            
            <div id="np-q-text" style="margin-top: 1.5rem; font-size: 1.25rem; color: var(--text-primary); font-weight: 500; line-height:1.6; text-align: left; white-space: pre-wrap;" class="hidden"></div>
            <!-- Review mode status icon -->
            <div id="np-review-status" class="hidden" style="margin-top:1rem;"></div>
          </div>

          <!-- Answer Bubbles -->
          <div id="np-bubbles-container" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 3rem;">
          </div>

          <!-- Navigation -->
          <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #21262d; padding-top: 1.5rem;">
            <button onclick="npPrevQuestion()" class="btn-back-dark" id="np-btn-prev" style="font-weight:600;">
              <i data-lucide="chevron-left" style="width:16px;height:16px;"></i> Previous
            </button>
            <div style="font-family: var(--font-mono); font-size: 0.875rem; color: #8b949e;" id="np-q-progress">1 / 10</div>
            <button onclick="npNextQuestion()" class="btn-back-dark" id="np-btn-next" style="font-weight:600;">
              Next <i data-lucide="chevron-right" style="width:16px;height:16px;"></i>
            </button>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- Results Overlay (shown after submission) -->
  <div id="np-results-overlay" class="modal-overlay hidden">
    <div class="modal-content modal-content-lg" style="max-width:480px;">
      <div id="np-results-icon" class="modal-icon"></div>
      <h2 id="np-results-title" class="modal-title" style="font-size:1.75rem;"></h2>
      <p id="np-results-desc" class="modal-desc"></p>
      <div id="np-results-breakdown" style="margin:1.5rem 0;"></div>
      <div class="modal-actions">
        <button onclick="exitReview()" class="btn btn-secondary">
          <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Exit
        </button>
        <button onclick="enterReviewMode()" class="btn btn-primary">
          <i data-lucide="search" style="width:16px;height:16px;"></i> Review Answers
        </button>
      </div>
    </div>
  </div>

  <div id="dialog-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div id="dialog-icon" class="modal-icon"></div>
      <h2 id="dialog-title" class="modal-title"></h2>
      <p id="dialog-msg" class="modal-desc"></p>
      <div id="dialog-actions" class="modal-actions"></div>
    </div>
  </div>

  <div id="hint-modal" class="modal-overlay hidden" style="backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); background-color: rgba(0, 0, 0, 0.6);">
    <div class="modal-content" style="max-width: 500px; text-align: center; border: 1px solid var(--border-color);">
      <div class="modal-icon" style="margin-bottom:1rem;">
        <i data-lucide="lightbulb" style="width:48px;height:48px;color:var(--color-warning);"></i>
      </div>
      <h2 class="modal-title" style="margin-bottom:1rem;">Hint</h2>
      <p id="hint-modal-text" class="modal-desc" style="font-size:1.125rem; color:var(--text-primary); line-height:1.6;"></p>
      <div class="modal-actions" style="margin-top:1.5rem;">
        <button onclick="closeHintModal()" class="btn btn-primary" style="width:100%;">Got It</button>
      </div>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dialogs.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/text-effects.js"></script>
  <script src="js/notes-practice.js"></script>
  <script src="js/tutorial.js"></script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      GuidedTutorial.init('notes-practice');
    });
  </script>

</body>
</html>
