<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudySession Pro — Practice coding challenge in a timed environment.">
  <title>StudySession Pro — Practice</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tutorial.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- ===== Practice Layout (full dark theme) ===== -->
  <div class="practice-layout">

    <!-- Top Bar -->
    <div class="practice-topbar">
      <div class="practice-topbar-left">
        <button onclick="window.location.href='browse.html'" class="btn-back-dark" id="practice-back-btn">
          <i data-lucide="chevron-left" style="width:18px;height:18px;"></i> Back
        </button>
        <span id="practice-title" class="practice-title-badge"></span>
      </div>

      <div class="practice-topbar-right">
        <button class="tutorial-trigger-btn" onclick="GuidedTutorial.start()" title="Show Page Tour">
          <i data-lucide="graduation-cap"></i>
        </button>
        <div class="timer-display">
          <i data-lucide="clock"></i>
          <span id="practice-timer">00:00</span>
        </div>
        <button onclick="submitCode()" class="btn-submit" id="submit-btn">
          <i data-lucide="check" style="width:16px;height:16px;"></i> Submit Code
        </button>
      </div>
    </div>

    <!-- Practice Body -->
    <div class="practice-body">
      <!-- Sidebar: Description & Samples -->
      <div class="practice-sidebar">
        <div>
          <h2>Description</h2>
          <p id="practice-desc"></p>
        </div>

        <div id="practice-samples-container" style="display:flex; flex-direction:column; gap:1rem;">
          <!-- Samples rendered by JS -->
        </div>

        <div class="practice-footer">
          <p>Practice writing the exact code logic. Line spaces & empty lines are forgiven. Press Submit to compare.</p>
        </div>
      </div>

      <!-- Code Editor -->
      <div class="practice-editor-area">
        <pre id="editor-pre" class="editor-pre"><code id="editor-code"></code></pre>
        <textarea id="editor-textarea" spellcheck="false" class="editor-textarea"
          placeholder="// Start typing your code here..."></textarea>
      </div>
    </div>
  </div>

  <!-- ===== Result Modal ===== -->
  <div id="result-modal" class="modal-overlay hidden">
    <div class="modal-content modal-content-lg">
      <div id="rm-icon" class="modal-icon"></div>
      <h2 id="rm-title" class="modal-title" style="font-size:1.75rem;"></h2>
      <p id="rm-desc" class="modal-desc"></p>
      <div id="rm-actions" class="modal-actions"></div>
    </div>
  </div>

  <!-- ===== Generic Dialog Modal ===== -->
  <div id="dialog-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div id="dialog-icon" class="modal-icon"></div>
      <h2 id="dialog-title" class="modal-title"></h2>
      <p id="dialog-msg" class="modal-desc"></p>
      <div id="dialog-actions" class="modal-actions"></div>
    </div>
  </div>

  <!-- ===== Scripts ===== -->
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/syntax.js"></script>
  <script src="js/diff.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/dialogs.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/text-effects.js"></script>
  <script src="js/practice.js"></script>
  <script src="js/tutorial.js"></script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      loadData();
      initPractice();
      lucide.createIcons();
      GuidedTutorial.init('practice');
    });
  </script>
</body>

</html>
